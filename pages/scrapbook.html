<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Scrapbook ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;

background-image:url('../images/background.jpg');

background-size:cover;

background-position:center;

background-attachment:fixed;

background-repeat:no-repeat;

padding:40px;

overflow-x:hidden;

min-height:100vh;

}

h1{

font-family:'Great Vibes',cursive;

font-size:65px;

text-align:center;

color:#1E90FF;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#5B7C99;

margin-bottom:50px;

font-size:18px;

}

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:45px;

max-width:1200px;

margin:auto;

}

.polaroid{

background:white;

padding:12px 12px 30px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

border-radius:6px;

cursor:pointer;

transition:.35s;

position:relative;

}

.polaroid:nth-child(odd){

transform:rotate(-4deg);

}

.polaroid:nth-child(even){

transform:rotate(4deg);

}

.polaroid:hover{

transform:scale(1.06) rotate(0);

z-index:20;

}

.polaroid img{

width:100%;

height:300px;

object-fit:cover;

border-radius:4px;

}

.caption{

margin-top:18px;

text-align:center;

font-size:18px;

color:#5B7C99;

font-weight:500;

}

/* Tape */

.polaroid::before{

content:"";

position:absolute;

width:80px;

height:25px;

background:rgba(255,235,120,.6);

top:-12px;

left:50%;

transform:translateX(-50%) rotate(-3deg);

}

/* Lightbox */

.lightbox{

position:fixed;

inset:0;

background:rgba(0,0,0,.9);

display:none;

justify-content:center;

align-items:center;

z-index:999;

flex-direction:column;

padding:20px;

}

.lightbox img{

max-width:90%;

max-height:80vh;

border-radius:10px;

box-shadow:0 20px 50px rgba(0,0,0,.5);

}

.close{

margin-top:20px;

color:white;

font-size:40px;

cursor:pointer;

}

.back{

position:fixed;

top:20px;

left:20px;

background:#1E90FF;

color:white;

text-decoration:none;

padding:12px 25px;

border-radius:50px;

font-weight:600;

transition:.3s;

}

.back:hover{

background:#4169E1;

}

@media(max-width:768px){

body{

padding:20px;

}

h1{

font-size:45px;

}

.polaroid img{

height:240px;

}

}

</style>

</head>

<body>

<a href="../index.html" class="back">← Home</a>

<h1>Our Scrapbook </h1>

<p class="subtitle">

Every picture tells a story...

Every story reminds me of you.

</p>

<div class="gallery">

<div class="polaroid">
<img src="../images/photos/photo1.jpg">
<div class="caption">Our First Memory </div>
</div>

<div class="polaroid">
<img src="../images/photos/photo2.jpg">
<div class="caption">You're My Favorite Person </div>
</div>

<div class="polaroid">
<img src="../images/photos/photo3.jpg">
<div class="caption">A Smile I Never Get Tired Of </div>
</div>

<div class="polaroid">
<img src="../images/photos/photo4.jpg">
<div class="caption">Forever My Safe Place </div>
</div>

<div class="polaroid">
<img src="../images/photos/photo5.jpg">
<div class="caption">Every Moment With You </div>
</div>

<div class="polaroid">
<img src="../images/photos/photo6.jpg">
<div class="caption">I Love You </div>
</div>

<div class="polaroid">
<img src="../images/photos/photo6.jpg">
<div class="caption">I Love You </div>
</div>

<div class="polaroid">
<img src="../images/photos/photo6.jpg">
<div class="caption">I Love You </div>
</div>

</div>

<div class="lightbox" id="lightbox">

<img id="preview">

<div class="close">&times;</div>

</div>

<script>

const photos=document.querySelectorAll(".polaroid img");

const lightbox=document.getElementById("lightbox");

const preview=document.getElementById("preview");

photos.forEach(photo=>{

photo.onclick=()=>{

preview.src=photo.src;

lightbox.style.display="flex";

}

})

lightbox.onclick=()=>{

lightbox.style.display="none";

}

</script>

</body>
</html>
