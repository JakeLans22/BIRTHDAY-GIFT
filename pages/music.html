<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Song ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

overflow:auto;

background-image:url('../images/background.jpg');

background-size:cover;

background-position:center;

background-attachment:fixed;

background-repeat:no-repeat;

position:relative;

padding:60px 20px;

}

/* Floating Notes */

.note{

position:absolute;

font-size:30px;

opacity:.4;

color:#6495ED;

animation:float 10s linear infinite;

}

@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

.back{

position:absolute;

top:20px;

left:20px;

padding:12px 25px;

background:#1E90FF;

color:white;

text-decoration:none;

border-radius:30px;

font-weight:bold;

}

/* Title */

h1{

font-family:'Great Vibes',cursive;

font-size:70px;

color:#1E90FF;

margin-bottom:15px;

margin-top:0;

}

p{

font-size:18px;

color:#5B7C99;

margin-bottom:50px;

text-align:center;

}

/* Vinyl */

.player{

position:relative;

width:320px;

height:320px;

margin-bottom:40px;

}

.record{

width:320px;

height:320px;

border-radius:50%;

background:

radial-gradient(circle,#111 20%,#222 21%,#000 35%,#222 36%,#000 55%,#222 56%,#000);

animation:spin 8s linear infinite;

display:flex;

justify-content:center;

align-items:center;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

.cover{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

width:170px;

height:170px;

border-radius:12px;

overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,.3);

}

.cover img{

width:100%;

height:100%;

object-fit:cover;

}

iframe{

margin-top:10px;

border-radius:15px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}

.quote{

margin-top:35px;

font-style:italic;

color:#5B7C99;

font-size:18px;

max-width:650px;

text-align:center;

padding:0 20px;

}

.song-section{

width:100%;

max-width:700px;

margin:40px auto;

text-align:center;

display:flex;

flex-direction:column;

align-items:center;

}

@media(max-width:600px){

h1{

font-size:50px;

}

.player{

width:250px;

height:250px;

}

.record{

width:250px;

height:250px;

}

.cover{

width:130px;

height:130px;

}

iframe{

width:100% !important;

max-width:100%;

}

}

</style>

</head>

<body>

<a href="../index.html" class="back">← Home</a>

<h1>Our Song </h1>

<p>

Every time I hear this song,<br>

I think of you.

</p>

<div class="player">

<div class="record"></div>

<div class="cover">

<img src="../images/fitterkarma.jpg">

</div>

</div>

<!-- Replace the VIDEO_ID with your song -->

<iframe width="560" height="315" src="https://www.youtube.com/embed/FpJxPzveHzA?si=SeTA2TcoR4vlXNex" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

<div class="quote">

"This isn't just our song...

it's the soundtrack of our love."



</div>

<h1 style="margin-top:80px;">Our Second Song </h1>

<p>

Another song that reminds me<br>

of the love we share.

</p>

<div class="player">

<div class="record"></div>

<div class="cover">

<img src="../images/libu.png">

</div>

</div>

<!-- Replace the VIDEO_ID with your second song -->

<iframe width="560" height="315" src="https://www.youtube.com/embed/8lbRDzhjqeM?si=dQ9RLxladp_PoxU-" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

<div class="quote">

"Every melody, every beat...

reminds me of you."

💙

</div>

</div>

<script>

for(let i=0;i<30;i++){

const note=document.createElement("div");

note.className="note";

note.innerHTML=["🎵","🎶"][Math.floor(Math.random()*2)];

note.style.left=Math.random()*100+"vw";

note.style.animationDuration=(6+Math.random()*8)+"s";

note.style.animationDelay=Math.random()*6+"s";

note.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(note);

}

</script>

</body>
</html>
